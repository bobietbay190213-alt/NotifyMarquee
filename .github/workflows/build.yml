name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: tar -xzf NotifyMarquee.tar.gz

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant permission
        run: chmod +x NotifyMarquee/gradlew

      - name: Build APK
        run: cd NotifyMarquee && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: NotifyMarquee-APK
          path: NotifyMarquee/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
